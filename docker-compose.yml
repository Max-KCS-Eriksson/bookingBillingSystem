version: "3.9"

services:
  db:
    image: postgres:16
    container_name: db
    environment: # WARN: Move to `.env` and load it!
      POSTGRES_DB: bookingdb
      POSTGRES_USER: bookinguser
      POSTGRES_PASSWORD: bookingpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - db
    environment: # WARN: Move to `.env` and load it!
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bookingdb
      SPRING_DATASOURCE_USERNAME: bookinguser
      SPRING_DATASOURCE_PASSWORD: bookingpass
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: mvn spring-boot:run

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
